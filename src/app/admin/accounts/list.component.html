<h1>Accounts</h1>

<button class="btn btn-sm btn-primary mb-2" routerLink="add">Add Account</button>

<table class="table table-striped">
  <thead>
    <tr>
      <th style="width:30%">Email</th>
      <th style="width:30%">Name</th>
      <th style="width:20%">Role</th>
      <th style="width:20%">Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let account of accounts">
      <td>{{ account.email }}</td>
      <td>{{ account.firstName }} {{ account.lastName }}</td>
      <td>{{ account.role }}</td>
      <td style="white-space: nowrap">
        <a class="btn btn-sm btn-primary" [routerLink]="['edit', account.id]">Edit</a>
        <button class="btn btn-sm btn-danger" (click)="deleteAccount(account.id!)" [disabled]="account.isDeleting">
          <span *ngIf="account.isDeleting" class="spinner-border spinner-border-sm mr-2"></span>
          Delete
        </button>
      </td>
    </tr>
    <tr *ngIf="!accounts.length">
      <td colspan="4" class="text-center">
        <div class="p-2">No accounts to display</div>
      </td>
    </tr>
  </tbody>
</table>
